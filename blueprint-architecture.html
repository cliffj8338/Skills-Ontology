<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint™ Platform Architecture — v4.44.46</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }
  
  .header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: flex-end;
    gap: 20px;
    flex-wrap: wrap;
  }
  
  .header h1 {
    font-size: 1.5em;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #8b5cf6, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .header .meta {
    font-size: 0.78em;
    color: #64748b;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  
  .header .meta .pill {
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    font-weight: 600;
    font-size: 0.9em;
  }
  
  .controls {
    padding: 12px 32px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  
  .controls .label {
    font-size: 0.7em;
    color: #475569;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    margin-right: 4px;
  }
  
  .filter-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: #94a3b8;
    font-size: 0.72em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  
  .filter-btn:hover { background: rgba(255,255,255,0.06); color: #e2e8f0; }
  .filter-btn.active { background: rgba(139,92,246,0.2); border-color: rgba(139,92,246,0.4); color: #a78bfa; }
  
  .search-box {
    margin-left: auto;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: #e2e8f0;
    font-size: 0.75em;
    font-family: inherit;
    width: 200px;
    outline: none;
    transition: border-color 0.15s;
  }
  
  .search-box:focus { border-color: rgba(139,92,246,0.5); }
  .search-box::placeholder { color: #475569; }
  
  .main {
    display: flex;
    gap: 0;
    min-height: calc(100vh - 140px);
  }
  
  .diagram-area {
    flex: 1;
    padding: 24px;
    overflow: auto;
  }
  
  .layer-section {
    margin-bottom: 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
    transition: opacity 0.2s;
  }
  
  .layer-section.dimmed { opacity: 0.25; }
  
  .layer-header {
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  
  .layer-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  
  .layer-label {
    font-size: 0.7em;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .layer-count {
    margin-left: auto;
    font-size: 0.65em;
    color: #475569;
  }
  
  .component-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 8px;
    padding: 12px;
  }
  
  .comp-card {
    padding: 14px 12px;
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    background: rgba(255,255,255,0.03);
    border: 1.5px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-height: 72px;
    justify-content: center;
    position: relative;
  }
  
  .comp-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  
  .comp-card.active {
    box-shadow: 0 0 0 2px var(--comp-color), 0 6px 20px rgba(0,0,0,0.4);
    background: rgba(255,255,255,0.06);
  }
  
  .comp-card.search-match {
    box-shadow: 0 0 0 2px #f59e0b, 0 0 12px rgba(245,158,11,0.2);
  }
  
  .comp-card.dimmed { opacity: 0.2; pointer-events: none; }
  
  .comp-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
  
  .comp-name {
    font-size: 0.72em;
    font-weight: 600;
    color: #e2e8f0;
    line-height: 1.3;
  }
  
  .comp-badge {
    position: absolute;
    top: 4px;
    right: 6px;
    font-size: 0.5em;
    padding: 1px 5px;
    border-radius: 8px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  
  /* Detail panel */
  .detail-panel {
    width: 380px;
    background: #1e293b;
    border-left: 1px solid rgba(255,255,255,0.06);
    overflow-y: auto;
    transition: width 0.2s;
    flex-shrink: 0;
  }
  
  .detail-panel.collapsed { width: 0; overflow: hidden; padding: 0; }
  
  .detail-header {
    padding: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  
  .detail-header .icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  
  .detail-header .info h2 {
    font-size: 1em;
    font-weight: 700;
    margin-bottom: 6px;
  }
  
  .detail-header .tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  
  .detail-header .tags span {
    font-size: 0.65em;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  
  .detail-close {
    margin-left: auto;
    background: none;
    border: none;
    color: #64748b;
    cursor: pointer;
    font-size: 1.1em;
    padding: 4px;
  }
  
  .detail-body { padding: 16px 20px; }
  
  .detail-desc {
    font-size: 0.82em;
    color: #94a3b8;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  
  .detail-section {
    margin-bottom: 14px;
  }
  
  .detail-section-title {
    font-size: 0.68em;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  
  .detail-section .items {
    font-size: 0.78em;
    color: #94a3b8;
    line-height: 1.8;
  }
  
  .detail-section .fn-tag {
    display: inline-block;
    padding: 1px 8px;
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.88em;
    margin: 1px 0;
  }
  
  .detail-section .flow-chip {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 8px;
    font-size: 0.85em;
    margin: 2px 2px;
    font-weight: 500;
  }
  
  .detail-debt {
    padding: 10px 14px;
    border-radius: 8px;
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.15);
    font-size: 0.78em;
    color: #fca5a5;
    line-height: 1.5;
  }
  
  .detail-debt .title {
    font-weight: 700;
    color: #ef4444;
    margin-bottom: 3px;
    font-size: 0.9em;
  }
  
  /* Stats bar */
  .stats-bar {
    padding: 14px 32px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    border-top: 1px solid rgba(255,255,255,0.04);
    background: rgba(255,255,255,0.02);
  }
  
  .stat {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .stat .num {
    font-size: 1.1em;
    font-weight: 800;
    background: linear-gradient(135deg, #8b5cf6, #06b6d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .stat .lbl {
    font-size: 0.68em;
    color: #64748b;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  .footer {
    padding: 16px 32px;
    text-align: center;
    font-size: 0.65em;
    color: #334155;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  
  @media (max-width: 900px) {
    .detail-panel { width: 100%; position: fixed; bottom: 0; left: 0; right: 0; max-height: 50vh; border-left: none; border-top: 1px solid rgba(255,255,255,0.1); z-index: 10; }
    .detail-panel.collapsed { max-height: 0; }
    .component-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  }
</style>
</head>

  { id:'firebase-sdk', name:'Firebase SDK', layer:'external', icon:'external', desc:'Firebase JS SDK v9 compat. Auth, Firestore, Analytics. CDN-loaded. Project: blueprint-career.', functions:['firebase.initializeApp()','firebase.auth()','firebase.firestore()'], lines:'CDN + ~2050-2100', deps:['Google Cloud project','CDN availability'], inputs:['Firebase config object'], outputs:['Auth state','Firestore client','Analytics'], debt:'Using compat layer. Should migrate to modular SDK.' },

];

var FLOWS = [
  ['wizard','firestore','saves profile','data'],
  ['wizard','skill-engine','LinkedIn skills','data'],
  ['wizard','anthropic','resume parse','api'],
  ['firestore','userdata','loads on auth','data'],
  ['userdata','skillsdata','syncs skills','sync'],
  ['userdata','blueprintdata','syncs values','sync'],
  ['network','skillsdata','reads','read'],
  ['cardview','skillsdata','reads','read'],
  ['jobs','match-engine','score jobs','data'],
  ['jobs','job-proxy','search','api'],
  ['match-engine','skillsdata','reads user skills','read'],
  ['match-engine','bls-wages','salary lookup','read'],
  ['blueprint','valuation','comp calc','data'],
  ['reports','gap-analysis','match data','data'],
  ['reports','pdf-gen','generates','data'],
  ['firebase-auth','ai-proxy','token validation','api'],
  ['firebase-auth','firestore','auth gate','api'],
  ['ai-proxy','anthropic','proxies','api'],
  ['job-proxy','jsearch','fetches','api'],
  ['job-proxy','free-apis','fetches','api'],
  ['job-proxy','keyed-apis','fetches','api'],
  ['skill-engine','onet','title→SOC','read'],
  ['valuation','bls-wages','salary data','read'],
  ['health-monitor','localstorage','persists','data'],
  ['incident-log','localstorage','persists','data'],
  ['verification','firestore','stores evidence','data'],
  ['verification','skillsdata','updates scores','sync'],
  ['blueprint','verification','evidence display','read'],
  ['reports','firestore','share tokens','data'],
  ['showcase','userdata','reads snapshot','read'],
  ['showcase','skillsdata','reads snapshot','read']
];

// ===== ICON MAP =====
var ICONS = {
  star:'★', compass:'⎈', skills:'◉', layers:'☰', target:'⊕', blueprint:'▣',
  clipboard:'📋', settings:'⚙', users:'👤', save:'💾', lock:'🔐', external:'⬡',
  shield:'⛨', money:'💲', software:'⚡'
};

// ===== RENDER =====
var activeComp = null;
var activeLayer = 'all';
var searchQuery = '';

function render() {
  var area = document.getElementById('diagramArea');
  var html = '';
  var layerOrder = ['frontend','runtime','backend','external'];
  
  layerOrder.forEach(function(layerId) {
    var meta = LAYERS[layerId];
    var comps = COMPONENTS.filter(function(c) { return c.layer === layerId; });
    var dimmed = activeLayer !== 'all' && activeLayer !== layerId;
    
    html += '<div class="layer-section' + (dimmed ? ' dimmed' : '') + '" data-layer="' + layerId + '">';
    html += '<div class="layer-header" style="background:' + meta.color + '0a;">'
      + '<div class="layer-dot" style="background:' + meta.color + ';"></div>'
      + '<span class="layer-label" style="color:' + meta.color + ';">' + meta.label + '</span>'
      + '<span class="layer-count">' + comps.length + ' components</span>'
      + '</div>';
    
    html += '<div class="component-grid">';
    comps.forEach(function(comp) {
      var isActive = activeComp === comp.id;
      var isMatch = searchQuery && (comp.name.toLowerCase().indexOf(searchQuery) >= 0 || comp.desc.toLowerCase().indexOf(searchQuery) >= 0);
      var isDimSearch = searchQuery && !isMatch;
      
      // Count connections
      var conns = FLOWS.filter(function(f) { return f[0] === comp.id || f[1] === comp.id; }).length;
      
      html += '<div class="comp-card' + (isActive ? ' active' : '') + (isMatch ? ' search-match' : '') + (isDimSearch ? ' dimmed' : '') + '" '
        + 'style="--comp-color:' + meta.color + ';" '
        + 'onclick="selectComponent(\'' + comp.id + '\')">'
        + '<div class="comp-icon" style="background:' + meta.color + '20; color:' + meta.color + ';">' + (ICONS[comp.icon] || '◆') + '</div>'
        + '<div class="comp-name">' + comp.name + '</div>'
        + (conns > 0 ? '<span class="comp-badge" style="background:' + meta.color + '25; color:' + meta.color + ';">' + conns + ' flows</span>' : '')
        + '</div>';
    });
    html += '</div></div>';
  });
  
  area.innerHTML = html;
  renderStats();
}

function selectComponent(id) {
  if (activeComp === id) { activeComp = null; closeDetail(); render(); return; }
  activeComp = id;
  render();
  showDetail(id);
}

function showDetail(id) {
  var comp = COMPONENTS.find(function(c) { return c.id === id; });
  if (!comp) return;
  
  var meta = LAYERS[comp.layer];
  var panel = document.getElementById('detailPanel');
  panel.classList.remove('collapsed');
  
  var incoming = FLOWS.filter(function(f) { return f[1] === id; });
  var outgoing = FLOWS.filter(function(f) { return f[0] === id; });
  
  var html = '<div class="detail-header">'
    + '<div class="icon" style="background:' + meta.color + '25; color:' + meta.color + ';">' + (ICONS[comp.icon] || '◆') + '</div>'
    + '<div class="info"><h2>' + comp.name + '</h2>'
    + '<div class="tags">'
    + '<span style="background:' + meta.color + '20; color:' + meta.color + ';">' + meta.label + '</span>'
    + (comp.lines ? '<span style="background:rgba(255,255,255,0.06); color:#64748b;">' + comp.lines + '</span>' : '')
    + '</div></div>'
    + '<button class="detail-close" onclick="closeDetail()">✕</button>'
    + '</div>';
  
  html += '<div class="detail-body">';
  html += '<div class="detail-desc">' + comp.desc + '</div>';
  
  // Functions
  html += '<div class="detail-section">'
    + '<div class="detail-section-title" style="color:#8b5cf6;">Key Functions</div>'
    + '<div class="items">' + comp.functions.map(function(f) { return '<span class="fn-tag">' + f + '</span>'; }).join(' ') + '</div>'
    + '</div>';
  
  // Dependencies
  html += '<div class="detail-section">'
    + '<div class="detail-section-title" style="color:#f59e0b;">Dependencies</div>'
    + '<div class="items">' + comp.deps.map(function(d) { return '→ ' + d; }).join('<br>') + '</div>'
    + '</div>';
  
  // I/O
  html += '<div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">';
  html += '<div class="detail-section">'
    + '<div class="detail-section-title" style="color:#10b981;">Inputs</div>'
    + '<div class="items">' + comp.inputs.map(function(i) { return '▸ ' + i; }).join('<br>') + '</div>'
    + '</div>';
  html += '<div class="detail-section">'
    + '<div class="detail-section-title" style="color:#06b6d4;">Outputs</div>'
    + '<div class="items">' + comp.outputs.map(function(o) { return '◂ ' + o; }).join('<br>') + '</div>'
    + '</div>';
  html += '</div>';
  
  // Data flows
  if (incoming.length > 0 || outgoing.length > 0) {
    html += '<div class="detail-section">'
      + '<div class="detail-section-title" style="color:#8b5cf6;">Data Flows</div>'
      + '<div class="items" style="display:flex; flex-wrap:wrap; gap:4px;">';
    incoming.forEach(function(f) {
      html += '<span class="flow-chip" style="background:rgba(16,185,129,0.12); color:#34d399; border:1px solid rgba(16,185,129,0.2);">' + f[0] + ' → ' + f[2] + '</span>';
    });
    outgoing.forEach(function(f) {
      html += '<span class="flow-chip" style="background:rgba(245,158,11,0.12); color:#fbbf24; border:1px solid rgba(245,158,11,0.2);">' + f[2] + ' → ' + f[1] + '</span>';
    });
    html += '</div></div>';
  }
  
  // Tech debt
  if (comp.debt) {
    html += '<div class="detail-debt">'
      + '<div class="title">⚠ Tech Debt</div>'
      + comp.debt
      + '</div>';
  }
  
  html += '</div>';
  panel.innerHTML = html;
}

function closeDetail() {
  activeComp = null;
  document.getElementById('detailPanel').classList.add('collapsed');
  render();
}

function filterLayer(layer) {
  activeLayer = layer;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  if (layer === 'all') {
    document.querySelector('.filter-btn').classList.add('active');
  } else {
    var btn = document.querySelector('.filter-btn[data-layer="' + layer + '"]');
    if (btn) btn.classList.add('active');
  }
  render();
}

function searchComponents(query) {
  searchQuery = query.toLowerCase().trim();
  render();
}

function renderStats() {
  var bar = document.getElementById('statsBar');
  var layerCounts = {};
  ['frontend','runtime','backend','external'].forEach(function(l) {
    layerCounts[l] = COMPONENTS.filter(function(c) { return c.layer === l; }).length;
  });
  
  var debtCount = COMPONENTS.filter(function(c) { return c.debt && c.debt !== 'None significant'; }).length;
  
  bar.innerHTML = '<div class="stat"><span class="num">' + COMPONENTS.length + '</span><span class="lbl">Components</span></div>'
    + '<div class="stat"><span class="num">' + FLOWS.length + '</span><span class="lbl">Data Flows</span></div>'
    + '<div class="stat"><span class="num">' + layerCounts.frontend + '</span><span class="lbl">Frontend</span></div>'
    + '<div class="stat"><span class="num">' + layerCounts.runtime + '</span><span class="lbl">Runtime</span></div>'
    + '<div class="stat"><span class="num">' + layerCounts.backend + '</span><span class="lbl">Backend</span></div>'
    + '<div class="stat"><span class="num">' + layerCounts.external + '</span><span class="lbl">External</span></div>'
    + '<div class="stat"><span class="num">' + debtCount + '</span><span class="lbl">Tech Debt Items</span></div>';
}

// Init
render();
</script>
</body>
</html>
