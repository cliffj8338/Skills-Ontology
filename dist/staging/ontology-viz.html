<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint™ Ontology Visualization Lab</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0e1a;
    color: #e2e8f0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow-x: hidden;
}
.header {
    padding: 24px 40px;
    border-bottom: 1px solid rgba(96,165,250,0.15);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    background: linear-gradient(180deg, rgba(96,165,250,0.06) 0%, transparent 100%);
}
.header h1 { font-size: 1.3em; font-weight: 700; letter-spacing: 0.04em; color: #60a5fa; }
.header span { font-size: 0.85em; color: #64748b; }
.nav {
    display: flex; gap: 6px; padding: 16px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-wrap: wrap;
}
.nav button {
    padding: 8px 18px; border-radius: 8px; border: 1px solid rgba(96,165,250,0.2);
    background: rgba(96,165,250,0.06); color: #94a3b8; font-size: 0.82em;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.nav button:hover { background: rgba(96,165,250,0.12); color: #e2e8f0; }
.nav button.active {
    background: rgba(96,165,250,0.18); color: #60a5fa;
    border-color: rgba(96,165,250,0.5);
}
.nav button.job-overlay {
    border-color: rgba(16,185,129,0.4);
    background: rgba(16,185,129,0.08);
}
.nav button.job-overlay.active {
    background: rgba(16,185,129,0.18); color: #10b981;
    border-color: rgba(16,185,129,0.6);
}
.viz-container { padding: 30px 40px; min-height: calc(100vh - 130px); }
.viz-title { font-size: 1.1em; font-weight: 700; margin-bottom: 6px; color: #e2e8f0; }
.viz-desc { font-size: 0.82em; color: #64748b; margin-bottom: 20px; max-width: 700px; line-height: 1.5; }
.viz-panel { display: none; }
.viz-panel.active { display: block; }
svg { overflow: visible; }
.tooltip {
    position: absolute; padding: 8px 14px; background: rgba(15,23,42,0.95);
    border: 1px solid rgba(96,165,250,0.3); border-radius: 8px;
    font-size: 0.78em; color: #e2e8f0; pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 100;
    max-width: 300px; line-height: 1.4;
}
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.78em; color: #94a3b8; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.job-banner {
    background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(96,165,250,0.08));
    border: 1px solid rgba(16,185,129,0.3); border-radius: 12px;
    padding: 16px 20px; margin-bottom: 20px; display: flex;
    justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
}
.job-banner .title { font-weight: 700; color: #e2e8f0; font-size: 1em; }
.job-banner .company { color: #64748b; font-size: 0.85em; }
.job-banner .match { font-size: 1.5em; font-weight: 800; color: #10b981; }
.job-banner .match span { font-size: 0.5em; font-weight: 600; color: #64748b; display: block; }
.match-stats { display: flex; gap: 20px; margin-bottom: 16px; }
.match-stat { font-size: 0.82em; font-weight: 600; }
.match-stat.matched { color: #10b981; }
.match-stat.gap { color: #ef4444; }
.match-stat.surplus { color: #64748b; }
</style>
</head>
<body>

<div class="header">
    <h1>BLUEPRINT&#8482; ONTOLOGY VISUALIZATION LAB</h1>
    <span>47 skills &middot; 7 roles &middot; 9 visualization modes</span>
</div>

<div class="nav" id="vizNav"></div>
<div class="viz-container" id="vizContainer"></div>
<div class="tooltip" id="tooltip" style="display:none;"></div>

<script>

    { name: 'Operations Monitoring', level: 'Mastery', category: 'Analytical' },

    { name: 'Integrity', level: 'Mastery', category: 'Leadership' },
    { name: 'Public Speaking', level: 'Mastery', category: 'Communication' },
    { name: 'Design Thinking', level: 'Mastery', category: 'Creative' },

    { name: 'Applied AI', level: 'Expert', category: 'Domain Expertise' },
    { name: 'Thought Leadership', level: 'Proficient', category: 'Communication' },

var ROLE_SKILL_MAP = {
    'VP, Global Strategy, GM CAB & Futurist': ['Design Thinking', 'Public Speaking', 'Go-to-Market Strategy', 'Applied AI', 'Enterprise AI Strategy', 'AI/ML Product Strategy', 'Strategic Foresight & Market Prediction', 'Competitive Analysis', 'Thought Leadership', 'Leadership', 'Crisis Leadership & Decision Making', 'Initiative'],
    'Executive Board Member': ['Public Speaking', 'Speaking', 'C-Suite Advisory & Influence', 'Negotiation', 'Leadership', 'Persuasion'],
    'Co-Founder/Chief Pilot': ['FAA Certified IFR Pilot', 'Nonprofit Leadership & Advocacy', 'Crisis Leadership & Decision Making', 'Management of Financial Resources'],
    'Touring/Studio Musician': ['Professional Musician', 'Coordination', 'Adaptability/Flexibility'],
    'Vice President, Global Strategy': ['Systems Analysis', 'Systems Evaluation', 'Persuasion', 'Management of Financial Resources', 'Management of Personnel Resources', 'Speaking', 'Leadership', 'Go-to-Market Strategy'],
    'Vice President of Client Services': ['Service Orientation', 'Social Perceptiveness', 'Active Listening', 'Coordination', 'Management of Personnel Resources', 'Speaking', 'Negotiation'],
    'Director, Client Services': ['Service Orientation', 'Time Management', 'Active Listening', 'Coordination', 'Writing', 'Management of Material Resources']
};
var MY_ROLES = Object.keys(ROLE_SKILL_MAP);

var MY_VALUES = [
    { name: 'Intellectual Integrity', selected: true, group: 'How I Think' },
    { name: 'Strategic Foresight Over Reaction', selected: true, group: 'How I Think' },
    { name: 'Radical Transparency', selected: true, group: 'How I Lead' },
    { name: 'Outcome-Focused Excellence', selected: true, group: 'How I Work' },
    { name: 'Elegant Simplicity', selected: true, group: 'What I Protect' },
    { name: 'Authentic, Human Leadership', selected: true, group: 'How I Lead' }
];

var ARAMARK_JOB_REQUIREMENTS = [
    'Negotiation', 'Persuasion', 'Speaking', 'Active Listening',
    'Service Orientation', 'Coordination', 'Social Perceptiveness',
    'Management of Financial Resources', 'Management of Personnel Resources',
    'Critical Thinking', 'Complex Problem Solving', 'Judgment and Decision Making',
    'Leadership', 'Go-to-Market Strategy', 'Competitive Analysis',
    'C-Suite Advisory & Influence', 'Systems Analysis',
    'Food Service Industry Knowledge'
];
var mySkillNames = MY_SKILLS.map(function(s) { return s.name; });
var ARAMARK_JOB = {
    title: 'Vice President, Client Growth - Enterprise Partnership Group',
    company: 'Aramark',
    matchedSkills: ARAMARK_JOB_REQUIREMENTS.filter(function(r) { return mySkillNames.indexOf(r) >= 0; }),
    gapSkills: ARAMARK_JOB_REQUIREMENTS.filter(function(r) { return mySkillNames.indexOf(r) < 0; }),
    surplusSkills: mySkillNames.filter(function(s) { return ARAMARK_JOB_REQUIREMENTS.indexOf(s) < 0; })
};
ARAMARK_JOB.match = Math.round(ARAMARK_JOB.matchedSkills.length / ARAMARK_JOB_REQUIREMENTS.length * 100);

var CAT_COLORS = {
    'Cognitive': '#60a5fa',
    'Analytical': '#818cf8',
    'Communication': '#f472b6',
    'Interpersonal': '#fb923c',
    'Management': '#fbbf24',
    'Domain Expertise': '#10b981',
    'Leadership': '#a78bfa',
    'Creative': '#ec4899',
    'Unique': '#6ee7b7'
};

var levelNum = { Novice: 1, Proficient: 2, Advanced: 3, Expert: 4, Mastery: 5 };

var VIZ_TYPES = [
    { id: 'force', name: 'Your Network', desc: 'Your current layout — skills centered with roles pushed to the perimeter. Node size = proficiency. Colors = skill categories.', job: false },
    { id: 'treemap', name: 'Treemap', desc: 'Your expertise distribution by category. Rectangle size = combined proficiency weight. Shows where your depth concentrates.', job: false },
    { id: 'sunburst', name: 'Sunburst', desc: 'Radial hierarchy: you at center, first ring = categories, outer ring = individual skills. Opacity = proficiency level.', job: false },
    { id: 'sankey', name: 'Sankey Flow', desc: 'How your skills flow into roles. Band width = proficiency. Shows which skills serve multiple roles (strategic assets).', job: false },
    { id: 'chord', name: 'Chord', desc: 'Category-to-role relationships. Arc width = number of shared skills. Reveals cross-cutting capability themes.', job: false },
    { id: 'radial', name: 'Radial Tree', desc: 'Full taxonomy dendrogram in a circle. Deterministic layout — no physics simulation, no jitter.', job: false },
    { id: 'constellation', name: 'Constellation', desc: 'Galaxy view — skills as stars with brightness = proficiency, grouped into category nebulae.', job: false },
    { id: 'joboverlay', name: 'Job Overlay', desc: 'Aramark VP Client Growth — your skills overlaid against job requirements. Green = matched, red = gap, grey = your surplus skills.', job: true },
    { id: 'jobsankey', name: 'Job Sankey', desc: 'Flow view of how your skills map to the Aramark VP Client Growth role. Shows matched, gap, and surplus flows.', job: true }
];

var tooltip = document.getElementById('tooltip');
function showTip(evt, html) {
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
    tooltip.style.left = (evt.pageX + 14) + 'px';
    tooltip.style.top = (evt.pageY - 14) + 'px';
}
function hideTip() { tooltip.style.display = 'none'; }

function buildNav() {
    var nav = document.getElementById('vizNav');
    VIZ_TYPES.forEach(function(v, i) {
        var btn = document.createElement('button');
        btn.textContent = v.name;
        btn.className = (i === 0 ? 'active' : '') + (v.job ? ' job-overlay' : '');
        btn.onclick = function() { switchViz(v.id); };
        nav.appendChild(btn);
    });
}

function switchViz(id) {
    document.querySelectorAll('.nav button').forEach(function(b, i) {
        var cls = VIZ_TYPES[i].job ? 'job-overlay' : '';
        b.className = cls + (VIZ_TYPES[i].id === id ? ' active' : '');
    });
    document.querySelectorAll('.viz-panel').forEach(function(p) { p.classList.remove('active'); });
    var panel = document.getElementById('viz-' + id);
    if (panel) {
        panel.classList.add('active');
        if (!panel.dataset.rendered) {
            panel.dataset.rendered = '1';
            renderers[id](panel);
        }
    }
}

var renderers = {};

renderers.force = function(panel) {
    var width = Math.min(960, window.innerWidth - 80);
    var height = 650;
    var svg = d3.select(panel).append('svg').attr('width', width).attr('height', height);
    var nodes = [];
    var links = [];

    nodes.push({ id: 'center', type: 'center', name: 'Cliff Jurkiewicz', radius: 22 });
    MY_ROLES.forEach(function(r) {
        nodes.push({ id: 'role-' + r, type: 'role', name: r, radius: 14 });
    });
    MY_SKILLS.forEach(function(s) {
        var lv = levelNum[s.level] || 3;
        nodes.push({ id: 'skill-' + s.name, type: 'skill', name: s.name, level: s.level, category: s.category, radius: 4 + lv * 2.2 });
        links.push({ source: 'center', target: 'skill-' + s.name, strength: 0.05 });
    });
    MY_ROLES.forEach(function(role) {
        var rSkills = ROLE_SKILL_MAP[role] || [];
        rSkills.forEach(function(sn) {
            if (MY_SKILLS.some(function(s) { return s.name === sn; })) {
                links.push({ source: 'role-' + role, target: 'skill-' + sn, strength: 0.03 });
            }
        });
    });

    var sim = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(function(d) { return d.id; }).distance(80).strength(0.05))
        .force('charge', d3.forceManyBody().strength(-400))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide(function(d) { return d.radius + 5; }))
        .force('radial-roles', d3.forceRadial(Math.min(width, height) * 0.42, width / 2, height / 2).strength(function(d) { return d.type === 'role' ? 0.8 : 0; }))
        .force('radial-skills', d3.forceRadial(Math.min(width, height) * 0.12, width / 2, height / 2).strength(function(d) { return d.type === 'skill' ? 0.15 : 0; }));

    var link = svg.selectAll('.link').data(links).join('line')
        .attr('stroke', 'rgba(96,165,250,0.06)').attr('stroke-width', 0.5);

    var node = svg.selectAll('.node').data(nodes).join('circle')
        .attr('r', function(d) { return d.radius; })
        .attr('fill', function(d) {
            if (d.type === 'center') return '#60a5fa';
            if (d.type === 'role') return ROLE_COLORS[d.name] || '#a78bfa';
            return CAT_COLORS[d.category] || '#60a5fa';
        })
        .attr('stroke', function(d) { return d.type === 'role' ? 'rgba(255,255,255,0.2)' : 'none'; })
        .attr('stroke-width', function(d) { return d.type === 'role' ? 2 : 0; })
        .attr('opacity', function(d) {
            if (d.type !== 'skill') return 1;
            return 0.35 + (levelNum[d.level] || 3) * 0.13;
        })
        .on('mouseover', function(evt, d) { showTip(evt, '<strong>' + d.name + '</strong>' + (d.level ? '<br>Level: ' + d.level : '') + (d.category ? '<br>' + d.category : '')); })
        .on('mouseout', hideTip);

    var label = svg.selectAll('.label').data(nodes.filter(function(d) { return d.type !== 'skill'; })).join('text')
        .text(function(d) { return d.name; })
        .attr('fill', function(d) { return d.type === 'center' ? '#60a5fa' : (ROLE_COLORS[d.name] || '#c4b5fd'); })
        .attr('font-size', function(d) { return d.type === 'center' ? '11px' : '8px'; })
        .attr('text-anchor', 'middle').attr('dy', function(d) { return d.radius + 14; })
        .attr('font-weight', 600);

    sim.on('tick', function() {
        link.attr('x1', function(d) { return d.source.x; }).attr('y1', function(d) { return d.source.y; })
            .attr('x2', function(d) { return d.target.x; }).attr('y2', function(d) { return d.target.y; });
        node.attr('cx', function(d) { return d.x; }).attr('cy', function(d) { return d.y; });
        label.attr('x', function(d) { return d.x; }).attr('y', function(d) { return d.y; });
    });
};

renderers.treemap = function(panel) {
    var width = Math.min(900, window.innerWidth - 80);
    var height = 520;
    var catGroups = {};
    MY_SKILLS.forEach(function(s) {
        if (!catGroups[s.category]) catGroups[s.category] = [];
        catGroups[s.category].push(s);
    });
    var root = d3.hierarchy({
        name: 'Skills', children: Object.entries(catGroups).map(function(e) {
            return { name: e[0], children: e[1].map(function(s) { return { name: s.name, value: levelNum[s.level] || 3, level: s.level, category: s.category }; }) };
        })
    }).sum(function(d) { return d.value; }).sort(function(a, b) { return b.value - a.value; });

    d3.treemap().size([width, height]).padding(3).paddingOuter(6).round(true)(root);
    var svg = d3.select(panel).append('svg').attr('width', width).attr('height', height);

    var cell = svg.selectAll('g').data(root.leaves()).join('g')
        .attr('transform', function(d) { return 'translate(' + d.x0 + ',' + d.y0 + ')'; });

    cell.append('rect')
        .attr('width', function(d) { return d.x1 - d.x0; })
        .attr('height', function(d) { return d.y1 - d.y0; })
        .attr('fill', function(d) { return CAT_COLORS[d.data.category] || '#60a5fa'; })
        .attr('opacity', function(d) { return 0.15 + (levelNum[d.data.level] || 3) * 0.15; })
        .attr('rx', 4)
        .attr('stroke', function(d) { return CAT_COLORS[d.data.category] || '#60a5fa'; })
        .attr('stroke-opacity', 0.4)
        .on('mouseover', function(evt, d) { showTip(evt, '<strong>' + d.data.name + '</strong><br>' + d.data.category + '<br>' + d.data.level); })
        .on('mouseout', hideTip);

    cell.append('text').attr('x', 5).attr('y', 15)
        .text(function(d) { var w = d.x1 - d.x0; return w > 70 ? d.data.name : (w > 40 ? d.data.name.substring(0, 8) + '\u2026' : ''); })
        .attr('fill', '#e2e8f0').attr('font-size', function(d) { return (d.x1 - d.x0) > 100 ? '9px' : '7px'; })
        .attr('font-weight', 600).attr('opacity', 0.9);
};

renderers.sunburst = function(panel) {
    var size = Math.min(620, window.innerWidth - 80);
    var radius = size / 2;
    var catGroups = {};
    MY_SKILLS.forEach(function(s) {
        if (!catGroups[s.category]) catGroups[s.category] = [];
        catGroups[s.category].push(s);
    });
    var root = d3.hierarchy({
        name: 'Cliff', children: Object.entries(catGroups).map(function(e) {
            return { name: e[0], children: e[1].map(function(s) { return { name: s.name, value: levelNum[s.level] || 3, level: s.level, category: s.category }; }) };
        })
    }).sum(function(d) { return d.value; }).sort(function(a, b) { return b.value - a.value; });

    d3.partition().size([2 * Math.PI, radius])(root);
    var svg = d3.select(panel).append('svg').attr('width', size).attr('height', size);
    var g = svg.append('g').attr('transform', 'translate(' + radius + ',' + radius + ')');

    var arc = d3.arc().startAngle(function(d) { return d.x0; }).endAngle(function(d) { return d.x1; })
        .innerRadius(function(d) { return d.y0 * 0.7; }).outerRadius(function(d) { return d.y1 * 0.7 - 1; })
        .padAngle(0.005).padRadius(radius / 2);

    g.append('circle').attr('r', root.y1 * 0.7 * 0.2).attr('fill', 'rgba(96,165,250,0.12)').attr('stroke', 'rgba(96,165,250,0.3)');
    g.append('text').text('CLIFF').attr('text-anchor', 'middle').attr('dy', '0.35em')
        .attr('fill', '#60a5fa').attr('font-size', '11px').attr('font-weight', 700).attr('letter-spacing', '0.1em');

    g.selectAll('path').data(root.descendants().filter(function(d) { return d.depth > 0; })).join('path')
        .attr('d', arc)
        .attr('fill', function(d) {
            var cat = d.depth === 1 ? d.data.name : d.data.category;
            return CAT_COLORS[cat] || '#60a5fa';
        })
        .attr('opacity', function(d) { return d.depth === 1 ? 0.65 : (0.25 + (levelNum[d.data.level] || 3) * 0.14); })
        .attr('stroke', COLORS.bg).attr('stroke-width', 0.5)
        .on('mouseover', function(evt, d) { showTip(evt, '<strong>' + d.data.name + '</strong>' + (d.data.level ? '<br>' + d.data.level : '<br>' + (d.children ? d.children.length : 0) + ' skills')); })
        .on('mouseout', hideTip);

    g.selectAll('.ct').data(root.children).join('text')
        .attr('transform', function(d) {
            var a = (d.x0 + d.x1) / 2; var r = (d.y0 + d.y1) / 2 * 0.7;
            return 'translate(' + (Math.sin(a) * r) + ',' + (-Math.cos(a) * r) + ') rotate(' + (a * 180 / Math.PI - 90 + (a > Math.PI ? 180 : 0)) + ')';
        })
        .text(function(d) { return d.data.name.length > 14 ? d.data.name.substring(0, 12) + '\u2026' : d.data.name; })
        .attr('text-anchor', 'middle').attr('dy', '0.35em')
        .attr('fill', '#e2e8f0').attr('font-size', '7.5px').attr('font-weight', 600);
};

renderers.sankey = function(panel) {
    var width = Math.min(960, window.innerWidth - 80);
    var height = 600;
    var svg = d3.select(panel).append('svg').attr('width', width).attr('height', height);
    var categories = Object.keys(CAT_COLORS);

    var flowLinks = [];
    MY_ROLES.forEach(function(role) {
        var rSkills = ROLE_SKILL_MAP[role] || [];
        var catCounts = {};
        rSkills.forEach(function(sn) {
            var sk = MY_SKILLS.find(function(s) { return s.name === sn; });
            if (sk) {
                if (!catCounts[sk.category]) catCounts[sk.category] = 0;
                catCounts[sk.category] += levelNum[sk.level] || 3;
            }
        });
        Object.entries(catCounts).forEach(function(e) {
            flowLinks.push({ source: e[0], target: role, value: e[1] });
        });
    });

    var leftNodes = categories.filter(function(c) { return flowLinks.some(function(l) { return l.source === c; }); });
    var rightNodes = MY_ROLES;
    var maxVal = d3.max(flowLinks, function(d) { return d.value; }) || 1;

    var yLeft = {}; leftNodes.forEach(function(n, i) { yLeft[n] = 20 + i * ((height - 40) / leftNodes.length); });
    var yRight = {}; rightNodes.forEach(function(n, i) { yRight[n] = 30 + i * ((height - 60) / rightNodes.length); });

    flowLinks.forEach(function(link) {
        var sY = yLeft[link.source]; var tY = yRight[link.target];
        if (sY === undefined || tY === undefined) return;
        var bw = Math.max(2, (link.value / maxVal) * 28);
        svg.append('path')
            .attr('d', 'M130,' + (sY + 14) + ' C' + (width * 0.45) + ',' + (sY + 14) + ' ' + (width * 0.55) + ',' + (tY + 14) + ' ' + (width - 220) + ',' + (tY + 14))
            .attr('fill', 'none').attr('stroke', CAT_COLORS[link.source] || '#60a5fa')
            .attr('stroke-width', bw).attr('opacity', 0.2)
            .on('mouseover', function(evt) { d3.select(this).attr('opacity', 0.5); showTip(evt, '<strong>' + link.source + ' \u2192 ' + link.target + '</strong><br>Weight: ' + link.value); })
            .on('mouseout', function() { d3.select(this).attr('opacity', 0.2); hideTip(); });
    });

    leftNodes.forEach(function(name) {
        var y = yLeft[name];
        svg.append('rect').attr('x', 0).attr('y', y).attr('width', 125).attr('height', 28).attr('rx', 6)
            .attr('fill', 'rgba(96,165,250,0.08)').attr('stroke', CAT_COLORS[name] || '#60a5fa').attr('stroke-opacity', 0.5);
        svg.append('text').attr('x', 62).attr('y', y + 18).text(name)
            .attr('fill', '#e2e8f0').attr('font-size', '9px').attr('font-weight', 600).attr('text-anchor', 'middle');
    });
    rightNodes.forEach(function(name, i) {
        var y = yRight[name];
        svg.append('rect').attr('x', width - 215).attr('y', y).attr('width', 215).attr('height', 28).attr('rx', 6)
            .attr('fill', 'rgba(167,139,250,0.08)').attr('stroke', ROLE_COLORS[name] || '#a78bfa').attr('stroke-opacity', 0.5);
        svg.append('text').attr('x', width - 108).attr('y', y + 18).text(name.length > 32 ? name.substring(0, 30) + '\u2026' : name)
            .attr('fill', ROLE_COLORS[name] || '#c4b5fd').attr('font-size', '9px').attr('font-weight', 600).attr('text-anchor', 'middle');
    });
};

renderers.chord = function(panel) {
    var size = Math.min(600, window.innerWidth - 80);
    var outerR = size / 2 - 60, innerR = outerR - 18;
    var categories = Object.keys(CAT_COLORS).filter(function(c) { return MY_SKILLS.some(function(s) { return s.category === c; }); });
    var groups = categories.concat(MY_ROLES);
    var n = groups.length;
    var matrix = []; for (var i = 0; i < n; i++) { matrix.push(new Array(n).fill(0)); }

    MY_ROLES.forEach(function(role) {
        var rSkills = ROLE_SKILL_MAP[role] || [];
        rSkills.forEach(function(sn) {
            var sk = MY_SKILLS.find(function(s) { return s.name === sn; });
            if (sk) {
                var ci = groups.indexOf(sk.category);
                var ri = groups.indexOf(role);
                if (ci >= 0 && ri >= 0) { matrix[ci][ri] += levelNum[sk.level] || 3; matrix[ri][ci] += levelNum[sk.level] || 3; }
            }
        });
    });

    var chord = d3.chord().padAngle(0.04).sortSubgroups(d3.descending);
    var chords = chord(matrix);
    var svg = d3.select(panel).append('svg').attr('width', size).attr('height', size);
    var g = svg.append('g').attr('transform', 'translate(' + (size / 2) + ',' + (size / 2) + ')');
    var arcGen = d3.arc().innerRadius(innerR).outerRadius(outerR);
    var ribbon = d3.ribbon().radius(innerR);

    g.selectAll('.ga').data(chords.groups.filter(function(d) { return d.value > 0; })).join('path')
        .attr('d', arcGen)
        .attr('fill', function(d) { var nm = groups[d.index]; return CAT_COLORS[nm] || ROLE_COLORS[nm] || '#a78bfa'; })
        .attr('opacity', 0.8)
        .on('mouseover', function(evt, d) { showTip(evt, '<strong>' + groups[d.index] + '</strong><br>Weight: ' + d.value); })
        .on('mouseout', hideTip);

    g.selectAll('.rb').data(chords).join('path')
        .attr('d', ribbon)
        .attr('fill', function(d) { return CAT_COLORS[groups[d.source.index]] || ROLE_COLORS[groups[d.source.index]] || '#a78bfa'; })
        .attr('opacity', 0.12)
        .on('mouseover', function(evt, d) { d3.select(this).attr('opacity', 0.4); showTip(evt, '<strong>' + groups[d.source.index] + ' \u2194 ' + groups[d.target.index] + '</strong>'); })
        .on('mouseout', function() { d3.select(this).attr('opacity', 0.12); hideTip(); });

    g.selectAll('.gl').data(chords.groups.filter(function(d) { return d.value > 0; })).join('text')
        .attr('transform', function(d) {
            var a = (d.startAngle + d.endAngle) / 2;
            return 'translate(' + (Math.sin(a) * (outerR + 14)) + ',' + (-Math.cos(a) * (outerR + 14)) + ')';
        })
        .text(function(d) { var n = groups[d.index]; return n.length > 22 ? n.substring(0, 20) + '\u2026' : n; })
        .attr('fill', '#94a3b8').attr('font-size', '7.5px').attr('font-weight', 600)
        .attr('text-anchor', function(d) { return (d.startAngle + d.endAngle) / 2 > Math.PI ? 'end' : 'start'; })
        .attr('dy', '0.35em');
};

renderers.radial = function(panel) {
    var size = Math.min(720, window.innerWidth - 80);
    var radius = size / 2 - 70;
    var catGroups = {};
    MY_SKILLS.forEach(function(s) { if (!catGroups[s.category]) catGroups[s.category] = []; catGroups[s.category].push(s); });

    var root = d3.hierarchy({
        name: 'Cliff', children: Object.entries(catGroups).map(function(e) {
            return { name: e[0], children: e[1].map(function(s) { return { name: s.name, level: s.level, category: s.category }; }) };
        })
    });
    d3.tree().size([2 * Math.PI, radius]).separation(function(a, b) { return (a.parent === b.parent ? 1 : 2) / a.depth; })(root);

    var svg = d3.select(panel).append('svg').attr('width', size).attr('height', size);
    var g = svg.append('g').attr('transform', 'translate(' + (size / 2) + ',' + (size / 2) + ')');

    g.selectAll('.lnk').data(root.links()).join('path')
        .attr('d', d3.linkRadial().angle(function(d) { return d.x; }).radius(function(d) { return d.y; }))
        .attr('fill', 'none')
        .attr('stroke', function(d) { return CAT_COLORS[d.target.data.category || d.target.data.name] || 'rgba(96,165,250,0.15)'; })
        .attr('stroke-opacity', 0.2).attr('stroke-width', 1.2);

    var nd = g.selectAll('.nd').data(root.descendants()).join('g')
        .attr('transform', function(d) { return 'rotate(' + (d.x * 180 / Math.PI - 90) + ') translate(' + d.y + ',0)'; });

    nd.append('circle')
        .attr('r', function(d) { return d.depth === 0 ? 12 : d.depth === 1 ? 7 : 3 + (levelNum[d.data.level] || 3) * 1; })
        .attr('fill', function(d) {
            if (d.depth === 0) return '#60a5fa';
            if (d.depth === 1) return CAT_COLORS[d.data.name] || '#60a5fa';
            return COLORS.levels[d.data.level] || '#60a5fa';
        })
        .attr('opacity', function(d) { return d.depth === 2 ? 0.45 + (levelNum[d.data.level] || 3) * 0.11 : 1; })
        .on('mouseover', function(evt, d) { showTip(evt, '<strong>' + d.data.name + '</strong>' + (d.data.level ? '<br>' + d.data.level : '')); })
        .on('mouseout', hideTip);

    nd.filter(function(d) { return d.depth < 2; }).append('text')
        .attr('dy', '0.35em')
        .attr('x', function(d) { return d.x < Math.PI === !d.children ? 14 : -14; })
        .attr('text-anchor', function(d) { return d.x < Math.PI === !d.children ? 'start' : 'end'; })
        .attr('transform', function(d) { return d.x >= Math.PI ? 'rotate(180)' : null; })
        .text(function(d) { return d.data.name; })
        .attr('fill', function(d) { return d.depth === 0 ? '#60a5fa' : '#94a3b8'; })
        .attr('font-size', function(d) { return d.depth === 0 ? '11px' : '8.5px'; }).attr('font-weight', 600);

    nd.filter(function(d) { return d.depth === 2; }).append('text')
        .attr('dy', '0.35em')
        .attr('x', function(d) { return d.x < Math.PI ? 10 : -10; })
        .attr('text-anchor', function(d) { return d.x < Math.PI ? 'start' : 'end'; })
        .attr('transform', function(d) { return d.x >= Math.PI ? 'rotate(180)' : null; })
        .text(function(d) { return d.data.name; })
        .attr('fill', '#4b5563').attr('font-size', '7px');
};

renderers.constellation = function(panel) {
    var width = Math.min(960, window.innerWidth - 80);
    var height = 650;
    var svg = d3.select(panel).append('svg').attr('width', width).attr('height', height);
    var defs = svg.append('defs');
    var glow = defs.append('filter').attr('id', 'glow');
    glow.append('feGaussianBlur').attr('stdDeviation', 3.5).attr('result', 'b');
    glow.append('feMerge').selectAll('feMergeNode').data(['b', 'SourceGraphic']).join('feMergeNode').attr('in', function(d) { return d; });

    for (var i = 0; i < 200; i++) {
        svg.append('circle').attr('cx', Math.random() * width).attr('cy', Math.random() * height)
            .attr('r', Math.random() * 1.2).attr('fill', '#334155').attr('opacity', Math.random() * 0.4 + 0.1);
    }

    var categories = Object.keys(CAT_COLORS).filter(function(c) { return MY_SKILLS.some(function(s) { return s.category === c; }); });
    var cAngle = 2 * Math.PI / categories.length;
    var cRadius = Math.min(width, height) * 0.3;
    var cx = width / 2, cy = height / 2;

    categories.forEach(function(cat, ci) {
        var ax = cx + Math.cos(cAngle * ci - Math.PI / 2) * cRadius;
        var ay = cy + Math.sin(cAngle * ci - Math.PI / 2) * cRadius;
        var catSkills = MY_SKILLS.filter(function(s) { return s.category === cat; });
        var color = CAT_COLORS[cat];

        catSkills.forEach(function(s, si) {
            var angle = (si / catSkills.length) * 2 * Math.PI + (Math.random() - 0.5) * 0.5;
            var dist = 20 + Math.random() * 65;
            var sx = ax + Math.cos(angle) * dist;
            var sy = ay + Math.sin(angle) * dist;
            var lv = levelNum[s.level] || 3;
            var starR = 1.5 + lv * 1.4;

            svg.append('circle').attr('cx', sx).attr('cy', sy).attr('r', starR + 5)
                .attr('fill', color).attr('opacity', 0.06 + lv * 0.03).attr('filter', 'url(#glow)');
            svg.append('circle').attr('cx', sx).attr('cy', sy).attr('r', starR)
                .attr('fill', color).attr('opacity', 0.25 + lv * 0.15).attr('filter', 'url(#glow)')
                .on('mouseover', function(evt) { showTip(evt, '<strong>' + s.name + '</strong><br>' + s.level + '<br>' + cat); })
                .on('mouseout', hideTip);
            if (lv >= 4) {
                svg.append('text').attr('x', sx).attr('y', sy + starR + 11).text(s.name.length > 22 ? s.name.substring(0, 20) + '\u2026' : s.name)
                    .attr('fill', color).attr('font-size', '6.5px').attr('font-weight', 600)
                    .attr('text-anchor', 'middle').attr('opacity', 0.5);
            }
        });

        svg.append('text').attr('x', ax).attr('y', ay - 80).text(cat.toUpperCase())
            .attr('fill', color).attr('font-size', '7.5px').attr('font-weight', 700)
            .attr('text-anchor', 'middle').attr('letter-spacing', '0.1em').attr('opacity', 0.45);
    });

    svg.append('circle').attr('cx', cx).attr('cy', cy).attr('r', 5).attr('fill', '#60a5fa').attr('filter', 'url(#glow)');
    svg.append('text').attr('x', cx).attr('y', cy + 18).text('CLIFF')
        .attr('fill', '#60a5fa').attr('font-size', '9px').attr('font-weight', 700)
        .attr('text-anchor', 'middle').attr('letter-spacing', '0.12em');
};

renderers.joboverlay = function(panel) {
    var width = Math.min(960, window.innerWidth - 80);
    var height = 700;

    var banner = document.createElement('div');
    banner.className = 'job-banner';
    banner.innerHTML = '<div><div class="title">' + ARAMARK_JOB.title + '</div><div class="company">' + ARAMARK_JOB.company + '</div></div>'
        + '<div class="match">' + ARAMARK_JOB.match + '%<span>match</span></div>';
    panel.appendChild(banner);

    var stats = document.createElement('div');
    stats.className = 'match-stats';
    stats.innerHTML = '<div class="match-stat matched">\u2713 ' + ARAMARK_JOB.matchedSkills.length + ' matched</div>'
        + '<div class="match-stat gap">\u25CB ' + ARAMARK_JOB.gapSkills.length + ' gaps</div>'
        + '<div class="match-stat surplus">\u25CF ' + ARAMARK_JOB.surplusSkills.length + ' surplus</div>';
    panel.appendChild(stats);

    var svg = d3.select(panel).append('svg').attr('width', width).attr('height', height);
    var nodes = [];
    var links = [];
    var midX = width * 0.35;
    var jobX = width * 0.78;

    nodes.push({ id: 'you', type: 'you', name: 'Cliff', x: midX - 100, y: height / 2, radius: 20 });

    var matchedSet = new Set(ARAMARK_JOB.matchedSkills);

    MY_SKILLS.forEach(function(s) {
        var isMatched = matchedSet.has(s.name);
        var status = isMatched ? 'matched' : 'surplus';
        nodes.push({ id: 'skill-' + s.name, type: 'skill', name: s.name, level: s.level, category: s.category,
            status: status, radius: isMatched ? 8 : 5 });
        links.push({ source: 'you', target: 'skill-' + s.name });
    });

    ARAMARK_JOB.gapSkills.forEach(function(name) {
        nodes.push({ id: 'gap-' + name, type: 'gap', name: name, status: 'gap', radius: 8 });
    });

    nodes.push({ id: 'job', type: 'job', name: ARAMARK_JOB.title.substring(0, 30), x: jobX, y: height / 2, radius: 18 });

    var sim = d3.forceSimulation(nodes)
        .force('charge', d3.forceManyBody().strength(-200))
        .force('collision', d3.forceCollide(function(d) { return d.radius + 4; }))
        .force('x-you', d3.forceX(function(d) {
            if (d.type === 'you') return midX - 100;
            if (d.type === 'job') return jobX;
            if (d.status === 'matched') return midX + 60;
            if (d.status === 'surplus') return midX - 180;
            if (d.status === 'gap') return jobX - 80;
            return midX;
        }).strength(0.12))
        .force('y', d3.forceY(height / 2).strength(0.03))
        .force('link', d3.forceLink(links).id(function(d) { return d.id; }).distance(60).strength(0.02));

    var link = svg.selectAll('.link').data(links).join('line')
        .attr('stroke', 'rgba(96,165,250,0.04)').attr('stroke-width', 0.5);

    var node = svg.selectAll('.node').data(nodes).join('circle')
        .attr('r', function(d) { return d.radius; })
        .attr('fill', function(d) {
            if (d.type === 'you') return '#60a5fa';
            if (d.type === 'job') return '#a78bfa';
            if (d.status === 'matched') return COLORS.matched;
            if (d.status === 'gap') return COLORS.gap;
            return '#475569';
        })
        .attr('opacity', function(d) {
            if (d.type === 'you' || d.type === 'job') return 1;
            if (d.status === 'matched') return 0.8;
            if (d.status === 'gap') return 0.9;
            return 0.35;
        })
        .attr('stroke', function(d) {
            if (d.status === 'matched') return 'rgba(16,185,129,0.4)';
            if (d.status === 'gap') return 'rgba(239,68,68,0.4)';
            return 'none';
        })
        .attr('stroke-width', function(d) { return d.status === 'matched' || d.status === 'gap' ? 2 : 0; })
        .on('mouseover', function(evt, d) {
            var statusLabel = d.status === 'matched' ? '<span style="color:#10b981">Matched</span>'
                : d.status === 'gap' ? '<span style="color:#ef4444">Gap</span>'
                : d.status === 'surplus' ? '<span style="color:#64748b">Your surplus</span>' : '';
            showTip(evt, '<strong>' + d.name + '</strong>' + (d.level ? '<br>' + d.level : '') + (statusLabel ? '<br>' + statusLabel : ''));
        })
        .on('mouseout', hideTip);

    var labels = svg.selectAll('.lbl').data(nodes.filter(function(d) { return d.type === 'you' || d.type === 'job' || d.status === 'matched' || d.status === 'gap'; })).join('text')
        .text(function(d) { return d.name.length > 24 ? d.name.substring(0, 22) + '\u2026' : d.name; })
        .attr('fill', function(d) {
            if (d.type === 'you') return '#60a5fa';
            if (d.type === 'job') return '#c4b5fd';
            if (d.status === 'matched') return 'rgba(16,185,129,0.7)';
            return 'rgba(239,68,68,0.7)';
        })
        .attr('font-size', function(d) { return d.type === 'you' || d.type === 'job' ? '10px' : '7px'; })
        .attr('font-weight', 600).attr('text-anchor', 'middle');

    sim.on('tick', function() {
        link.attr('x1', function(d) { return d.source.x; }).attr('y1', function(d) { return d.source.y; })
            .attr('x2', function(d) { return d.target.x; }).attr('y2', function(d) { return d.target.y; });
        node.attr('cx', function(d) { return d.x; }).attr('cy', function(d) { return d.y; });
        labels.attr('x', function(d) { return d.x; }).attr('y', function(d) { return d.y + d.radius + 12; });
    });
};

renderers.jobsankey = function(panel) {
    var width = Math.min(960, window.innerWidth - 80);
    var height = 700;

    var banner = document.createElement('div');
    banner.className = 'job-banner';
    banner.innerHTML = '<div><div class="title">' + ARAMARK_JOB.title + '</div><div class="company">' + ARAMARK_JOB.company + ' &mdash; Skill Flow Analysis</div></div>'
        + '<div class="match">' + ARAMARK_JOB.match + '%<span>match</span></div>';
    panel.appendChild(banner);

    var svg = d3.select(panel).append('svg').attr('width', width).attr('height', height);

    var matchedSkills = ARAMARK_JOB.matchedSkills;
    var surplusSkills = ARAMARK_JOB.surplusSkills;

    var colLeft = 10, colMid = width * 0.42, colRight = width - 160;
    var matchY = 20, gapY, surplusY;

    svg.append('text').attr('x', colLeft).attr('y', 14).text('YOUR SKILLS')
        .attr('fill', '#64748b').attr('font-size', '9px').attr('font-weight', 700).attr('letter-spacing', '0.08em');
    svg.append('text').attr('x', colRight + 10).attr('y', 14).text('JOB REQUIREMENTS')
        .attr('fill', '#64748b').attr('font-size', '9px').attr('font-weight', 700).attr('letter-spacing', '0.08em');

    matchedSkills.forEach(function(name, i) {
        var y = 30 + i * 24;
        var mySkill = MY_SKILLS.find(function(s) { return s.name === name; });
        svg.append('rect').attr('x', colLeft).attr('y', y).attr('width', colMid - 30).attr('height', 18).attr('rx', 4)

        svg.append('text').attr('x', colRight + 8).attr('y', y + 13).text(name)

        svg.append('path')

        matchY = y + 28;
    });

    gapY = matchY + 20;
    svg.append('text').attr('x', colRight + 10).attr('y', gapY).text('GAPS')
        .attr('fill', '#ef4444').attr('font-size', '8px').attr('font-weight', 700).attr('letter-spacing', '0.08em');

    ARAMARK_JOB.gapSkills.forEach(function(name, i) {

        svg.append('rect').attr('x', colRight).attr('y', y).attr('width', width - colRight - 10).attr('height', 18).attr('rx', 4)

        surplusY = y + 28;
    });

    surplusY = surplusY + 20;
    svg.append('text').attr('x', colLeft).attr('y', surplusY).text('YOUR SURPLUS (not required)')
        .attr('fill', '#64748b').attr('font-size', '8px').attr('font-weight', 700).attr('letter-spacing', '0.08em');
    surplusY += 8;

    surplusSkills.slice(0, 18).forEach(function(name, i) {
        var y = surplusY + i * 18;
        var sk = MY_SKILLS.find(function(s) { return s.name === name; });
        svg.append('text').attr('x', colLeft + 8).attr('y', y + 12).text(name + (sk ? ' (' + sk.level + ')' : ''))
            .attr('fill', '#475569').attr('font-size', '7.5px');
    });
    if (surplusSkills.length > 18) {
        svg.append('text').attr('x', colLeft + 8).attr('y', surplusY + 18 * 18 + 12)
            .text('+ ' + (surplusSkills.length - 18) + ' more...')
            .attr('fill', '#374151').attr('font-size', '7.5px').attr('font-style', 'italic');
    }
};

function init() {
    buildNav();
    var container = document.getElementById('vizContainer');
    VIZ_TYPES.forEach(function(v, i) {
        var panel = document.createElement('div');
        panel.id = 'viz-' + v.id;
        panel.className = 'viz-panel' + (i === 0 ? ' active' : '');
        panel.innerHTML = '<div class="viz-title">' + v.name + '</div><div class="viz-desc">' + v.desc + '</div>';
        if (!v.job && v.id !== 'force' && v.id !== 'constellation') {
            var legend = document.createElement('div');
            legend.className = 'legend';
            Object.entries(CAT_COLORS).forEach(function(e) {
                if (MY_SKILLS.some(function(s) { return s.category === e[0]; })) {
                    legend.innerHTML += '<div class="legend-item"><div class="legend-dot" style="background:' + e[1] + '"></div>' + e[0] + '</div>';
                }
            });
            panel.appendChild(legend);
        }
        container.appendChild(panel);
    });
    renderers.force(document.getElementById('viz-force'));
}

init();
</script>
</body>
</html>
